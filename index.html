<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="工尺譜">
    <title>工尺譜發聲器</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #7294c1; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
            -webkit-touch-callout: none; -webkit-user-select: none;
        }
        .container { 
            text-align: center; background: #e0e0e0; 
            padding: 25px 20px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 320px; 
        }
        
        /* 高低音切換開關樣式 */
        .octave-selector {
            display: flex; justify-content: space-around;
            background: #d0d0d0; border-radius: 10px;
            padding: 5px; margin-bottom: 20px;
        }
        .octave-btn {
            flex: 1; border: none; background: transparent;
            padding: 8px; border-radius: 8px; cursor: pointer;
            font-weight: bold; color: #555; transition: 0.2s;
        }
        .octave-btn.active {
            background: #7294c1; color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .button-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; 
        }
        button.note-btn { 
            background: #ffffff; border: 1px solid #bbb; border-radius: 12px; 
            padding: 15px 0; cursor: pointer; display: flex; 
            flex-direction: column; align-items: center; 
            transition: all 0.1s ease; box-shadow: 0 3px 0 #ccc;
            -webkit-tap-highlight-color: transparent;
        }
        button.note-btn:active {
            transform: translateY(2px) scale(0.96);
            box-shadow: 0 1px 0 #999; background-color: #f9f9f9;
        }
        .pronounce { font-size: 13px; color: #666; }
        .note-name { font-size: 32px; font-weight: bold; color: #f1b821; line-height: 1.1; }
        .solfa { font-size: 16px; font-weight: bold; color: #444; }
        .hint-text { font-size: 11px; color: #777; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="margin-top:0; margin-bottom:15px; color:#333;">工尺譜發聲器</h2>
        
        <!-- 高低音切換 -->
        <div class="octave-selector">
            <button class="octave-btn" onclick="setOctave(0.5, this)">低音 (下點)</button>
            <button class="octave-btn active" onclick="setOctave(1, this)">中音</button>
            <button class="octave-btn" onclick="setOctave(2, this)">高音 (撇)</button>
        </div>

        <div class="button-grid">
            <button class="note-btn" onclick="playNote(392.00)"><span class="pronounce">(何)</span><span class="note-name">合</span><span class="solfa">s,</span></button>
            <button class="note-btn" onclick="playNote(440.00)"><span class="pronounce">(士)</span><span class="note-name">士</span><span class="solfa">l,</span></button>
            <button class="note-btn" onclick="playNote(493.88)"><span class="pronounce">(二)</span><span class="note-name">乙</span><span class="solfa">t,</span></button>
            <button class="note-btn" onclick="playNote(523.25)"><span class="pronounce">(省)</span><span class="note-name">上</span><span class="solfa">d</span></button>
            <button class="note-btn" onclick="playNote(587.33)"><span class="pronounce">(車)</span><span class="note-name">尺</span><span class="solfa">r</span></button>
            <button class="note-btn" onclick="playNote(659.25)"><span class="pronounce">(工)</span><span class="note-name">工</span><span class="solfa">m</span></button>
            <button class="note-btn" onclick="playNote(698.46)"><span class="pronounce">(番)</span><span class="note-name">反</span><span class="solfa">f</span></button>
            <button class="note-btn" onclick="playNote(783.99)"><span class="pronounce">(了)</span><span class="note-name">六</span><span class="solfa">s</span></button>
            <button class="note-btn" onclick="playNote(880.00)"><span class="pronounce">(烏)</span><span class="note-name">五</span><span class="solfa">l</span></button>
        </div>

        <div class="hint-text">
            💡 若無聲，請關閉<b>靜音模式</b>。可用 iPad「加入主畫面」功能全螢幕使用。
        </div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let multiplier = 1; // 預設中音

        function setOctave(m, btn) {
            multiplier = m;
            // 更新按鈕樣式
            document.querySelectorAll('.octave-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // 嘗試喚醒音頻（針對某些 iOS 版本）
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playNote(freq) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            // 將原始頻率乘以倍率 (0.5, 1, 或 2)
            osc.frequency.setValueAtTime(freq * multiplier, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }
    </script>
</body>
</html>

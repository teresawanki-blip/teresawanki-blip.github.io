<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工尺譜發聲器</title>
    <style>
        body { font-family: sans-serif; background-color: #7294c1; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; background: #e0e0e0; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 320px; }
        .button-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button { background: #fff; border: 1px solid #ccc; border-radius: 6px; padding: 12px 0; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .pronounce { font-size: 13px; color: #666; }
        .note-name { font-size: 30px; font-weight: bold; color: #f1b821; }
        .solfa { font-size: 18px; font-weight: bold; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="margin-top:0;">工尺譜發聲器</h2>
        <p style="font-size: 12px; color: #666; margin-bottom: 20px; line-height: 1.4;">
        💡 提示：如果沒有聲音，請檢查設備是否已<br>
        <b>關閉靜音模式</b>（或側邊靜音開關）。
    </p>

    <div class="button-grid">
                <div class="button-grid">
            <button onclick="playNote(392.00)"><span class="pronounce">(何)</span><span class="note-name">合</span><span class="solfa">s,</span></button>
            <button onclick="playNote(440.00)"><span class="pronounce">(士)</span><span class="note-name">士</span><span class="solfa">l,</span></button>
            <button onclick="playNote(493.88)"><span class="pronounce">(二)</span><span class="note-name">乙</span><span class="solfa">t,</span></button>
            <button onclick="playNote(523.25)"><span class="pronounce">(省)</span><span class="note-name">上</span><span class="solfa">d</span></button>
            <button onclick="playNote(587.33)"><span class="pronounce">(車)</span><span class="note-name">尺</span><span class="solfa">r</span></button>
            <button onclick="playNote(659.25)"><span class="pronounce">(工)</span><span class="note-name">工</span><span class="solfa">m</span></button>
            <button onclick="playNote(698.46)"><span class="pronounce">(番)</span><span class="note-name">反</span><span class="solfa">f</span></button>
            <button onclick="playNote(783.99)"><span class="pronounce">(了)</span><span class="note-name">六</span><span class="solfa">s</span></button>
            <button onclick="playNote(880.00)"><span class="pronounce">(烏)</span><span class="note-name">五</span><span class="solfa">l</span></button>
        </div>
    </div>
    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        function playNote(freq) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }
    </script>
</body>
</html>
